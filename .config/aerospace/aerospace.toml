# ==============================
# General
# ==============================
after-login-command = []
after-startup-command = []
start-at-login = true

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# ==============================
# Gaps (padding around windows)
# ==============================
[gaps]
inner.horizontal = 10
inner.vertical = 10
outer.left = 20
outer.bottom = 20
outer.top = 20
outer.right = 20

# ==============================
# Main key bindings
# ==============================
[mode.main.binding]

# --- App shortcuts ---
alt-1 = ['exec-and-forget open -a "Arc"', 'workspace 1']
alt-2 = ['exec-and-forget open -a "Kitty"', 'workspace 2']
alt-3 = ['exec-and-forget open -a "Visual Studio Code"', 'workspace 3']
alt-4 = ['exec-and-forget open -a "Discord"', 'workspace 4']
alt-5 = ['exec-and-forget open -a "Finder"', 'workspace 5']

# --- Workspace switching ---
alt-shift-1 = 'workspace 1'
alt-shift-2 = 'workspace 2'
alt-shift-3 = 'workspace 3'
alt-shift-4 = 'workspace 4'
alt-shift-5 = 'workspace 5'

# --- Move window to workspace ---
ctrl-alt-1 = 'move-node-to-workspace 1'
ctrl-alt-2 = 'move-node-to-workspace 2'
ctrl-alt-3 = 'move-node-to-workspace 3'
ctrl-alt-4 = 'move-node-to-workspace 4'
ctrl-alt-5 = 'move-node-to-workspace 5'

# --- Focus windows ---
alt-h = 'focus left'
alt-l = 'focus right'
alt-k = 'focus up'
alt-j = 'focus down'

# --- Move windows ---
alt-shift-h = 'move left'
alt-shift-l = 'move right'
alt-shift-k = 'move up'
alt-shift-j = 'move down'

# --- Layout ---
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# --- Fullscreen ---
alt-f = 'fullscreen'

# --- Reload config ---
alt-shift-r = 'reload-config'

# ==============================
# App workspace assignments
# ==============================

[[on-window-detected]]
if.app-id = 'company.thebrowser.Browser'  # Arc
run = ['move-node-to-workspace 1', 'workspace 1']

[[on-window-detected]]
if.app-id = 'net.kovidgoyal.kitty'  # Kitty
run = ['move-node-to-workspace 2', 'workspace 2']

[[on-window-detected]]
if.app-id = 'com.microsoft.VSCode'  # VS Code
run = ['move-node-to-workspace 3', 'workspace 3']

[[on-window-detected]]
if.app-id = 'com.hnc.Discord'  # Discord
run = ['move-node-to-workspace 4', 'workspace 4']

[[on-window-detected]]
if.app-id = 'com.apple.finder'  # Finder
run = ['move-node-to-workspace 5', 'workspace 5']
